<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>سین‌یار | شیشه‌ای</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Rubik:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html {
            scroll-behavior: smooth !important;
        }

        body {
            font-family: 'Rubik', sans-serif;
            direction: rtl;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 20px;
            background: #e8e8ec;
            background-image: 
                radial-gradient(ellipse at 30% 40%, rgba(108, 92, 231, 0.08) 0%, transparent 60%),
                radial-gradient(ellipse at 70% 60%, rgba(0, 0, 0, 0.04) 0%, transparent 60%);
            position: relative;
            -webkit-overflow-scrolling: touch;
            scrollbar-width: none;
            -ms-overflow-style: none;
        }

        body::-webkit-scrollbar {
            display: none;
            width: 0;
            height: 0;
        }

        .bg-circle {
            position: fixed;
            border-radius: 50%;
            pointer-events: none;
            opacity: 0.5;
        }
        .bg-circle-1 {
            width: 300px;
            height: 300px;
            top: -80px;
            right: -80px;
            background: rgba(108, 92, 231, 0.15);
            filter: blur(40px);
        }
        .bg-circle-2 {
            width: 250px;
            height: 250px;
            bottom: -60px;
            left: -60px;
            background: rgba(108, 92, 231, 0.12);
            filter: blur(30px);
        }
        .bg-circle-3 {
            width: 150px;
            height: 150px;
            top: 50%;
            left: 20%;
            background: rgba(255, 255, 255, 0.4);
            filter: blur(20px);
        }

        .box {
            max-width: 620px;
            width: 100%;
            border-radius: 48px;
            padding: 32px 32px 28px;
            text-align: center;
            position: relative;
            z-index: 2;
            
            background: rgba(255, 255, 255, 0.25);
            backdrop-filter: blur(50px);
            -webkit-backdrop-filter: blur(50px);
            border: 1px solid rgba(255, 255, 255, 0.6);
            
            box-shadow: 
                0 20px 60px rgba(0, 0, 0, 0.06),
                0 10px 30px rgba(0, 0, 0, 0.04),
                0 4px 12px rgba(0, 0, 0, 0.02),
                inset 0 1px 1px rgba(255, 255, 255, 0.8),
                inset 0 -1px 1px rgba(0, 0, 0, 0.05);
            
            transition: all 0.6s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        .box:hover {
            transform: translateY(-4px);
            box-shadow: 
                0 30px 80px rgba(0, 0, 0, 0.08),
                0 15px 40px rgba(0, 0, 0, 0.05),
                0 6px 16px rgba(0, 0, 0, 0.03),
                inset 0 1px 2px rgba(255, 255, 255, 0.9);
        }

        .hero-box {
            background: rgba(255, 255, 255, 0.3);
            backdrop-filter: blur(40px);
            -webkit-backdrop-filter: blur(40px);
            border-radius: 28px;
            padding: 28px 28px 24px;
            border: 1px solid rgba(255, 255, 255, 0.5);
            position: relative;
            
            box-shadow: 
                0 12px 40px rgba(0, 0, 0, 0.04),
                0 6px 16px rgba(0, 0, 0, 0.02),
                inset 0 1px 1px rgba(255, 255, 255, 0.7);
            
            mask-image: linear-gradient(to bottom, 
                rgba(0, 0, 0, 0) 0%,
                rgba(0, 0, 0, 0.3) 8%,
                rgba(0, 0, 0, 0.8) 20%,
                rgba(0, 0, 0, 1) 35%,
                rgba(0, 0, 0, 1) 65%,
                rgba(0, 0, 0, 0.8) 80%,
                rgba(0, 0, 0, 0.3) 92%,
                rgba(0, 0, 0, 0) 100%
            );
            -webkit-mask-image: linear-gradient(to bottom, 
                rgba(0, 0, 0, 0) 0%,
                rgba(0, 0, 0, 0.3) 8%,
                rgba(0, 0, 0, 0.8) 20%,
                rgba(0, 0, 0, 1) 35%,
                rgba(0, 0, 0, 1) 65%,
                rgba(0, 0, 0, 0.8) 80%,
                rgba(0, 0, 0, 0.3) 92%,
                rgba(0, 0, 0, 0) 100%
            );
        }

        .hero-box::before {
            content: '';
            position: absolute;
            top: 0;
            left: 10%;
            right: 10%;
            height: 2px;
            background: linear-gradient(90deg, 
                transparent, 
                rgba(108, 92, 231, 0.25), 
                transparent
            );
            border-radius: 50%;
            pointer-events: none;
            z-index: 3;
        }

        .hero-box::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 45%;
            background: linear-gradient(180deg, 
                rgba(255, 255, 255, 0.15) 0%,
                transparent 100%
            );
            border-radius: 28px 28px 0 0;
            pointer-events: none;
            z-index: 3;
        }

        .hero-icon-full {
            width: 100%;
            max-width: 280px;
            height: auto;
            margin: 0 auto 4px;
            display: block;
            position: relative;
            z-index: 2;
        }

        .hero-icon-full svg {
            width: 100%;
            height: 100%;
            display: block;
        }

        /* ============================================================
           عنوان - بزرگ و یک خطی
           ============================================================ */
        .title-box {
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-radius: 18px;
            padding: 14px 28px;
            margin: 6px auto 10px;
            display: inline-block;
            border: 1px solid rgba(255, 255, 255, 0.2);
            box-shadow: 
                0 4px 20px rgba(0, 0, 0, 0.02),
                inset 0 1px 1px rgba(255, 255, 255, 0.3);
            position: relative;
            z-index: 2;
        }

        .hero-box .title {
            font-size: 1.9rem;
            font-weight: 800;
            line-height: 1.3;
            letter-spacing: -0.5px;
            
            /* ===== یک خطی ===== */
            white-space: nowrap;
            display: inline-flex;
            align-items: center;
            gap: 4px;
            flex-wrap: nowrap;
            
            color: #1a1a2e;
            
            background: linear-gradient(135deg, 
                #1a1a2e 0%,
                #2d1b69 35%,
                #6c5ce7 65%,
                #2d1b69 100%
            );
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            
            text-shadow: 0 2px 30px rgba(108, 92, 231, 0.06);
        }

        .hero-box .title .sep {
            font-weight: 300;
            color: #aaa;
            -webkit-text-fill-color: #aaa;
            opacity: 0.3;
        }

        .hero-box .title .bold {
            font-weight: 900;
        }

        .hero-box .description {
            font-size: 0.95rem;
            color: #1a1a2e;
            font-weight: 400;
            line-height: 2.1;
            text-align: justify;
            position: relative;
            z-index: 2;
            padding: 0 4px;
            letter-spacing: 0.2px;
        }

        .hero-box .description strong {
            color: #2d1b69;
            font-weight: 700;
        }

        .hero-box .description .highlight-text {
            color: #6c5ce7;
            font-weight: 600;
        }

        .buttons {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-top: 20px;
        }

        .btn-first {
            grid-column: 1 / -1;
        }

        .btn-second, .btn-third {
            grid-column: span 1;
        }

        .btn {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            padding: 14px 12px;
            border-radius: 18px;
            font-family: 'Rubik', sans-serif;
            font-weight: 500;
            font-size: 0.78rem;
            cursor: pointer;
            position: relative;
            overflow: hidden;
            transition: none;

            background: rgba(255, 255, 255, 0.22);
            backdrop-filter: blur(25px) saturate(180%);
            -webkit-backdrop-filter: blur(25px) saturate(180%);
            border: 1px solid rgba(255, 255, 255, 0.55);
            color: #222;
            
            box-shadow: 
                0 8px 24px rgba(0, 0, 0, 0.04),
                0 4px 12px rgba(0, 0, 0, 0.02),
                0 2px 6px rgba(0, 0, 0, 0.01),
                inset 0 1px 2px rgba(255, 255, 255, 0.8),
                inset 0 -1px 1px rgba(0, 0, 0, 0.03);
        }

        .btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 50%;
            background: linear-gradient(180deg, rgba(255, 255, 255, 0.35) 0%, rgba(255, 255, 255, 0) 100%);
            pointer-events: none;
            border-radius: 17px 17px 0 0;
        }

        .btn i {
            font-size: 0.8rem;
            color: #444;
            transition: color 0.2s ease;
        }

        .btn:hover {
            background: rgba(255, 255, 255, 0.42);
            border-color: rgba(255, 255, 255, 0.85);
            color: #000;
            box-shadow: 
                0 16px 40px rgba(0, 0, 0, 0.08),
                0 8px 24px rgba(0, 0, 0, 0.05),
                0 4px 12px rgba(0, 0, 0, 0.03),
                inset 0 1px 3px rgba(255, 255, 255, 1);
            transform: none;
        }

        .btn:hover i {
            color: #000;
        }

        .btn-primary {
            background: rgba(255, 255, 255, 0.45);
            border: 1px solid rgba(255, 255, 255, 0.75);
            color: #000;
            font-weight: 600;
            box-shadow: 
                0 12px 32px rgba(108, 92, 231, 0.10),
                0 6px 16px rgba(0, 0, 0, 0.04),
                0 3px 8px rgba(0, 0, 0, 0.02),
                inset 0 1px 2px rgba(255, 255, 255, 0.95);
        }

        .btn-primary::before {
            background: linear-gradient(180deg, rgba(255, 255, 255, 0.5) 0%, rgba(255, 255, 255, 0) 100%);
        }

        .btn-primary:hover {
            background: rgba(255, 255, 255, 0.65);
            border-color: #ffffff;
            box-shadow: 
                0 20px 48px rgba(108, 92, 231, 0.15),
                0 10px 28px rgba(0, 0, 0, 0.06),
                0 4px 12px rgba(0, 0, 0, 0.03),
                inset 0 1px 3px #ffffff;
        }

        .toast {
            position: fixed;
            bottom: 40px;
            left: 50%;
            transform: translateX(-50%) translateY(100px);
            background: rgba(255, 255, 255, 0.4);
            backdrop-filter: blur(40px);
            -webkit-backdrop-filter: blur(40px);
            border: 1px solid rgba(255, 255, 255, 0.6);
            color: #111;
            padding: 12px 28px;
            border-radius: 18px;
            font-size: 0.8rem;
            font-weight: 500;
            opacity: 0;
            transition: all 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
            z-index: 999;
            box-shadow: 
                0 16px 40px rgba(0, 0, 0, 0.08),
                0 8px 24px rgba(0, 0, 0, 0.04),
                0 4px 12px rgba(0, 0, 0, 0.02);
        }

        .toast.show {
            opacity: 1;
            transform: translateX(-50%) translateY(0);
        }

        .scroll-top {
            position: fixed;
            bottom: 30px;
            right: 30px;
            width: 50px;
            height: 50px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.3);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.4);
            color: #111;
            font-size: 1.2rem;
            cursor: pointer;
            z-index: 999;
            opacity: 0;
            visibility: hidden;
            transform: translateY(20px) scale(0.8);
            transition: all 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.04);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .scroll-top.visible {
            opacity: 1;
            visibility: visible;
            transform: translateY(0) scale(1);
        }

        .scroll-top:hover {
            background: rgba(255, 255, 255, 0.5);
            border-color: rgba(255, 255, 255, 0.6);
            box-shadow: 0 12px 32px rgba(0, 0, 0, 0.06);
        }

        .scroll-top i {
            transition: transform 0.3s ease;
        }

        .scroll-top:hover i {
            transform: translateY(-2px);
        }

        /* ============================================================
           ریسپانسیو - عنوان بزرگ و یک خطی
           ============================================================ */
        @media (max-width: 600px) {
            .box { padding: 20px 16px 18px; border-radius: 32px; }
            .btn { padding: 12px 8px; font-size: 0.72rem; border-radius: 14px; }
            .hero-box { padding: 20px 16px 16px; border-radius: 22px; }
            
            .hero-box .title {
                font-size: 1.4rem;
                white-space: nowrap !important;
                display: inline-flex !important;
                flex-wrap: nowrap !important;
            }
            
            .hero-box .description { font-size: 0.82rem; line-height: 1.9; }
            .hero-icon-full { max-width: 200px; }
            .buttons { gap: 6px; margin-top: 14px; }
            .title-box { padding: 10px 18px; }
            .scroll-top { width: 44px; height: 44px; font-size: 1rem; bottom: 20px; right: 20px; }
        }

        @media (max-width: 420px) {
            .hero-box .title {
                font-size: 1.1rem;
                white-space: nowrap !important;
                display: inline-flex !important;
                flex-wrap: nowrap !important;
            }
            .hero-box .description { font-size: 0.75rem; line-height: 1.8; }
            .btn { padding: 10px 6px; font-size: 0.65rem; border-radius: 12px; }
            .btn i { font-size: 0.65rem; }
            .hero-icon-full { max-width: 160px; }
            .title-box { padding: 8px 14px; }
        }

        @media (max-width: 360px) {
            .hero-box .title {
                font-size: 0.9rem;
                white-space: nowrap !important;
                display: inline-flex !important;
                flex-wrap: nowrap !important;
            }
            .hero-box .description { font-size: 0.68rem; }
            .btn { padding: 8px 4px; font-size: 0.58rem; border-radius: 10px; }
            .btn i { font-size: 0.55rem; }
            .hero-icon-full { max-width: 130px; }
            .title-box { padding: 6px 10px; }
        }
    </style>
</head>

    <div class="bg-circle bg-circle-2"></div>
    <div class="bg-circle bg-circle-3"></div>

                </div>
            </div>

            <div class="description">
                <strong>سین‌یار</strong> | تجربه‌ای تازه از خدمات هوشمند <span class="highlight-text">شبکه‌های اجتماعی</span> است؛ نرم‌افزاری برای گسترش <strong>کانال‌ها</strong> و <strong>پیج‌ها</strong> که به سرعت با کیفیت بالا همیشه اولین همه باشد. <strong>سین‌یار</strong> با مدیریت کانال‌ها و افزایش تعامل، از هدر رفتن فرصت‌های فروش جلوگیری می‌کند.

            </button>

            <button class="btn btn-second" onclick="showToast('📦 سفارش ثبت شد')">
                <i class="fas fa-shopping-bag"></i> سفارش
            </button>

            <button class="btn btn-second" onclick="showToast('🎧 مشاوره رایگان')">
                <i class="fas fa-headset"></i> مشاوره
            </button>

            <button class="btn btn-third" onclick="showToast('📸 نمونه‌کارها')">
                <i class="fas fa-images"></i> نمونه‌کارها
            </button>

            <button class="btn btn-third" onclick="showToast('🎬 ویدیو معرفی')">
                <i class="fas fa-play-circle"></i> ویدیو
            </button>

        </div>

    </div>

    <button class="scroll-top" id="scrollTop" onclick="window.scrollTo({top:0, behavior:'smooth'})">
        <i class="fas fa-arrow-up"></i>
    </button>

    <div class="toast" id="toast">
        <span id="toastMsg"></span>
    </div>

    <script>
        function showToast(msg) {
            const t = document.getElementById('toast');
            document.getElementById('toastMsg').textContent = msg;
            t.classList.add('show');
            clearTimeout(t._t);
            t._t = setTimeout(() => t.classList.remove('show'), 2600);
        }

        window.addEventListener('scroll', function() {
            const btn = document.getElementById('scrollTop');
            if (window.scrollY > 300) {
                btn.classList.add('visible');
            } else {
                btn.classList.remove('visible');
            }
        });
    </script>
