<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>سفارشات من</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Vazirmatn:wght@400;500;600;700;800;900&family=Rubik:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
*{ box-sizing:border-box; margin:0; padding:0; }
html,body{ 
  background:#f8f9fc; 
  font-family:'Rubik', 'Vazirmatn', sans-serif;
  display:flex;
  justify-content:center;
  color:#1a1a2e;
  -webkit-user-select:none;
  user-select:none;
  -webkit-tap-highlight-color:transparent;
  min-height:100vh;
  width:100%;
  overflow-x:hidden;
}
body{
  min-height:100vh;
  padding:0;
  margin:0;
  background:#f8f9fc;
  overflow-x:hidden;
}

.page{
width:100%;
max-width:412px;
min-height:100vh;
padding:16px 16px 30px;
margin:0 auto;
position:relative;
}

.header{
display:flex;
align-items:center;
justify-content:space-between;
margin-bottom:14px;
padding-top:2px;
}
.back-btn{
width:42px;
height:42px;
border-radius:14px;
background:#ffffff;
border:1px solid #eef0f4;
display:flex;
align-items:center;
justify-content:center;
cursor:pointer;
transition:transform .25s ease;
color:#6b7280;
box-shadow:0 2px 6px rgba(0,0,0,0.04);
outline:none;
}
.back-btn:active{ transform:scale(.88); }
.back-btn svg{ width:22px; height:22px; stroke:currentColor; }

.title{
display:flex;
align-items:center;
gap:10px;
font-size:20px;
font-weight:800;
color:#1a1a2e;
letter-spacing:-0.5px;
}
.title svg{ width:26px; height:26px; flex-shrink:0; }
.title span{ color:#1a1a2e; }
.header-spacer{ width:42px; }

.subtitle{
font-size:12px;
color:#9ca3af;
font-weight:500;
text-align:right;
margin-bottom:14px;
}

.search-box{
display:flex;
align-items:center;
gap:10px;
background:#ffffff;
border:1px solid #eef0f4;
border-radius:14px;
padding:10px 16px;
margin-bottom:14px;
transition:all .3s ease;
box-shadow:0 2px 6px rgba(0,0,0,0.04);
}
.search-box:focus-within{
border-color:#1a1a2e;
box-shadow:0 4px 14px rgba(0,0,0,0.06);
}
.search-box svg{ width:20px; height:20px; flex-shrink:0; }
.search-box input{
flex:1;
background:transparent;
border:none;
outline:none;
color:#1a1a2e;
font-family:'Rubik', 'Vazirmatn', sans-serif;
font-size:13px;
font-weight:500;
direction:rtl;
}
.search-box input::placeholder{ color:#c4c9d4; font-weight:400; }

.filter-tabs{
display:flex;
gap:6px;
margin-bottom:14px;
}
.filter-btn{
flex:1;
padding:7px 4px;
border-radius:30px;
border:1px solid #e0e4ea;
background:#ffffff;
color:#6b7280;
font-family:'Rubik', 'Vazirmatn', sans-serif;
font-size:12px;
font-weight:700;
cursor:pointer;
transition:all .35s cubic-bezier(0.34, 1.56, 0.64, 1);
text-align:center;
display:flex;
align-items:center;
justify-content:center;
gap:5px;
box-shadow:0 2px 6px rgba(0,0,0,0.04);
outline:none;
}
.filter-btn:active{ transform:scale(.94); }
.filter-btn.active{
background:#1a1a2e;
color:#ffffff;
border-color:#1a1a2e;
box-shadow:0 4px 16px rgba(26,26,46,0.18);
transform:scale(1.02);
}
.filter-btn.active:active{ transform:scale(.94); }
.filter-btn svg{ width:16px; height:16px; flex-shrink:0; transition:all .4s cubic-bezier(0.34, 1.56, 0.64, 1); }
.filter-btn.active svg{ transform:scale(1.1); filter:brightness(0) invert(1); }

.filter-btn[data-filter="completed"].active{
  background:#10b981;
  border-color:#10b981;
}
.filter-btn[data-filter="canceled"].active{
  background:#ef4444;
  border-color:#ef4444;
}
.filter-btn[data-filter="active"].active{
  background:#f59e0b;
  border-color:#f59e0b;
}
.filter-btn[data-filter="all"].active{
  background:#1a1a2e;
  border-color:#1a1a2e;
}

#ordersList{
display:flex;
flex-direction:column;
gap:10px;
}
.order-card{
background:#ffffff;
border:1px solid #eef0f4;
border-radius:16px;
padding:14px 16px;
transition:all .3s ease;
cursor:default;
box-shadow:0 2px 6px rgba(0,0,0,0.04);
}
.order-card:active{ transform:scale(.97); }

.order-card-top{
display:flex;
align-items:center;
justify-content:space-between;
margin-bottom:6px;
}
.order-id{
font-family:'Rubik', sans-serif;
font-weight:600;
font-size:11px;
color:#9ca3af;
}
.order-id span{ color:#1a1a2e; font-weight:700; }

.order-status{
display:flex;
align-items:center;
gap:5px;
padding:2px 10px;
border-radius:16px;
font-size:10px;
font-weight:700;
letter-spacing:0.2px;
}
.order-status svg{ width:12px; height:12px; flex-shrink:0; }
.order-status.active{ background:#fef3c7; color:#d97706; }
.order-status.active svg{ stroke:#d97706; }
.order-status.completed{ background:#d1fae5; color:#059669; }
.order-status.completed svg{ stroke:#059669; }
.order-status.canceled{ background:#fee2e2; color:#dc2626; }
.order-status.canceled svg{ stroke:#dc2626; }

.order-card-middle{
display:flex;
align-items:center;
justify-content:space-between;
margin-bottom:6px;
}
.order-product{
display:flex;
align-items:center;
gap:10px;
}
.order-product-icon{
width:36px;
height:36px;
border-radius:10px;
background:#1a1a2e;
display:flex;
align-items:center;
justify-content:center;
flex-shrink:0;
}
.order-product-icon svg{ width:18px; height:18px; color:#ffffff; }
.order-product-info{
display:flex;
flex-direction:column;
gap:1px;
}
.order-product-name{
font-size:13px;
font-weight:700;
color:#1a1a2e;
}
.order-product-desc{
font-size:10px;
color:#9ca3af;
font-weight:500;
}
.order-stats{
display:flex;
align-items:center;
gap:10px;
}
.order-stats .stat-item{
display:flex;
flex-direction:column;
align-items:flex-end;
}
.order-stats .stat-value{
font-family:'Rubik', sans-serif;
font-weight:800;
font-size:15px;
color:#1a1a2e;
direction:ltr;
}
.order-stats .stat-label{
font-size:8px;
color:#9ca3af;
font-weight:600;
text-transform:uppercase;
letter-spacing:0.4px;
}
.order-card-bottom{
display:flex;
align-items:center;
justify-content:space-between;
padding-top:8px;
border-top:1px solid #f0f2f6;
}
.order-date{
font-size:10px;
color:#9ca3af;
font-weight:500;
display:flex;
align-items:center;
gap:5px;
}
.order-date svg{ width:16px; height:16px; flex-shrink:0; }
.order-rakt{
display:flex;
align-items:center;
gap:4px;
font-family:'Rubik', sans-serif;
font-weight:700;
font-size:11px;
color:#1a1a2e;
}
.order-rakt .rakt-icon{
width:14px;
height:14px;
background:#1a1a2e;
border-radius:3px;
display:inline-flex;
align-items:center;
justify-content:center;
flex-shrink:0;
}
.order-rakt .rakt-icon svg{ width:9px; height:9px; color:#ffffff; }

/* ===== خالی ===== */
.empty-orders{
text-align:center;
padding:60px 20px;
display:flex;
flex-direction:column;
align-items:center;
}
.empty-orders .empty-icon{
width:80px;
height:80px;
border-radius:18px;
background:#ffffff;
border:1px solid #eef0f4;
display:flex;
align-items:center;
justify-content:center;
margin-bottom:16px;
box-shadow:0 2px 6px rgba(0,0,0,0.04);
}
.empty-orders .empty-icon svg{
width:40px;
height:40px;
color:#d1d5db;
}
.empty-orders h3{
font-size:18px;
font-weight:700;
color:#6b7280;
margin-bottom:4px;
}
.empty-orders p{
font-size:13px;
color:#b0b8c4;
font-weight:500;
}

::-webkit-scrollbar{ width:0px; height:0px; background:transparent; }
*{ scrollbar-width:none; -ms-overflow-style:none; }

@media (max-width:380px){
.page{ padding:12px 12px 20px; }
.title{ font-size:17px; }
.title svg{ width:22px; height:22px; }
.filter-btn{ font-size:11px; padding:6px 2px; border-radius:24px; }
.filter-btn svg{ width:14px; height:14px; }
.order-card{ padding:12px 14px; border-radius:14px; }
.order-product-icon{ width:32px; height:32px; border-radius:8px; }
.order-product-icon svg{ width:15px; height:15px; }
.order-product-name{ font-size:12px; }
.order-stats .stat-value{ font-size:14px; }
.order-status svg{ width:10px; height:10px; }
.order-date svg{ width:14px; height:14px; }
}
</style>
</head>

function renderOrders(filter = 'all', search = '') {
  const container = document.getElementById('ordersList');
  const empty = document.getElementById('emptyOrders');
  let filtered = ordersData;
  if (filter !== 'all') filtered = filtered.filter(order => order.status === filter);
  if (search.trim()) {
    const q = search.trim().toLowerCase();
    filtered = filtered.filter(order => order.id.toLowerCase().includes(q) || order.typeName.includes(q) || order.date.includes(q));
  }
  if (filtered.length === 0) { container.innerHTML = ''; empty.style.display = 'flex'; return; }
  empty.style.display = 'none';
  container.innerHTML = '';
  filtered.forEach(order => {
    const card = document.createElement('div');
    card.className = 'order-card';
    const typeIcon = typeIcons[order.type] || typeIcons.view;
    card.innerHTML = `
      <div class="order-card-top">
        <div class="order-id">شناسه <span>${order.id.replace('#', '')}</span></div>
        <div class="order-status ${order.status}">${statusIcons[order.status]}${order.statusText}</div>
      </div>
      <div class="order-card-middle">
        <div class="order-product">
          <div class="order-product-icon">${typeIcon}</div>
          <div class="order-product-info">
            <span class="order-product-name">${order.typeName}</span>
            <span class="order-product-desc">${order.quantity.toLocaleString()} عدد</span>
          </div>
        </div>
        <div class="order-stats"><div class="stat-item"><span class="stat-value">${order.quantity.toLocaleString()}</span><span class="stat-label">تعداد</span></div></div>
      </div>
      <div class="order-card-bottom">
        <div class="order-date">
          <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M14 22H10C6.22876 22 4.34315 22 3.17157 20.8284C2 19.6569 2 17.7712 2 14V12C2 8.22876 2 6.34315 3.17157 5.17157C4.34315 4 6.22876 4 10 4H14C17.7712 4 19.6569 4 20.8284 5.17157C22 6.34315 22 8.22876 22 12V14C22 17.7712 22 19.6569 20.8284 20.8284C20.1752 21.4816 19.3001 21.7706 18 21.8985" stroke="#9ca3af" stroke-width="1.5" stroke-linecap="round"/>

document.addEventListener('DOMContentLoaded', function() {
  const filterBtns = document.querySelectorAll('.filter-btn');
  filterBtns.forEach(btn => {
    btn.addEventListener('click', function() {
      filterBtns.forEach(b => b.classList.remove('active'));
      this.classList.add('active');
      const svg = this.querySelector('svg');
      if (svg) { svg.style.transform = 'scale(1.3)'; setTimeout(() => { svg.style.transform = 'scale(1.1)'; }, 150); }
      renderOrders(this.dataset.filter, document.getElementById('searchInput').value);
    });
  });
  document.getElementById('searchInput').addEventListener('input', function() {
    const active = document.querySelector('.filter-btn.active');
    renderOrders(active ? active.dataset.filter : 'all', this.value);
  });
  document.getElementById('backBtn').addEventListener('click', function() {
    window.Telegram && window.Telegram.WebApp ? window.Telegram.WebApp.close() : window.history.back();
  });
  renderOrders('all', '');
});
</script>
