<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>سین‌یار | منوی شیشه‌ای</title>
    
    <link href="https://cdn.jsdelivr.net/gh/rastikerdar/vazirmatn@v33.003/Vazirmatn-font-face.css" rel="stylesheet" type="text/css" />
    <link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
    
    <style>
        :root {
            --primary-color: #6366f1;
            --secondary-color: #a855f7;
            --bg-light: #f8fafc;
            --glass-bg: rgba(255, 255, 255, 0.6);
            --glass-border: rgba(255, 255, 255, 0.3);
            --glass-shadow: rgba(0, 0, 0, 0.06);
            --text-dark: #1e293b;
            --text-gray: #64748b;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            outline: none;
            -webkit-tap-highlight-color: transparent !important;
            -webkit-user-select: none !important;
            -moz-user-select: none !important;
            -ms-user-select: none !important;
            user-select: none !important;
        }

        *:focus {
            outline: none !important;
        }
        
        body {
            font-family: 'Vazirmatn', sans-serif;
            background-color: var(--bg-light);
            color: var(--text-dark);
            direction: rtl;
            min-height: 100vh;
            overflow-x: hidden;
            position: relative;
        }

        .background-blobs {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            overflow: hidden;
        }

        .blob {
            position: absolute;
            filter: blur(100px);
            opacity: 0.3;
            animation: floatBlob 14s infinite ease-in-out alternate;
        }

        .blob-1 {
            top: -10%;
            right: -10%;
            width: 500px;
            height: 500px;
            background: #e0e7ff;
            border-radius: 40% 60% 70% 30% / 40% 50% 60% 50%;
        }

        .blob-2 {
            bottom: -10%;
            left: -10%;
            width: 400px;
            height: 400px;
            background: #f3e8ff;
            border-radius: 60% 40% 30% 70% / 60% 30% 70% 40%;
            animation-delay: -6s;
        }

        @keyframes floatBlob {
            0% { transform: translate(0, 0) rotate(0deg) scale(1); }
            50% { transform: translate(40px, -30px) rotate(5deg) scale(1.1); }
            100% { transform: translate(-30px, 40px) rotate(-5deg) scale(0.95); }
        }

        /* ===== HEADER ===== */
        .header {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            width: 90%;
            max-width: 1200px;
            z-index: 999;
            padding: 0 28px;
            height: 64px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: var(--glass-bg);
            backdrop-filter: blur(24px) saturate(1.4);
            -webkit-backdrop-filter: blur(24px) saturate(1.4);
            border: 1px solid var(--glass-border);
            border-radius: 32px;
            transition: all 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
            box-shadow: 
                0 8px 40px rgba(99, 102, 241, 0.08),
                0 4px 20px rgba(0, 0, 0, 0.04),
                inset 0 1px 0 rgba(255, 255, 255, 0.6);
        }

        .header.scrolled {
            top: 10px;
            height: 58px;
            width: 95%;
            background: rgba(255, 255, 255, 0.8);
            border-radius: 28px;
            box-shadow: 
                0 12px 50px rgba(99, 102, 241, 0.1),
                0 4px 25px rgba(0, 0, 0, 0.06),
                inset 0 1px 0 rgba(255, 255, 255, 0.6);
        }

        .header .nav {
            width: 100%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            height: 100%;
        }

        /* ===== LOGO - غیرفعال ===== */
        .logo {
            display: flex;
            align-items: center;
            gap: 10px;
            text-decoration: none;
            color: var(--text-dark);
            cursor: default !important;
            pointer-events: none !important;
            -webkit-tap-highlight-color: transparent !important;
        }

        .logo .logo-icon {
            width: 38px;
            height: 38px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .logo .logo-icon svg {
            width: 38px;
            height: 38px;
            display: block;
        }

        .logo .logo-text {
            font-family: 'Baloo 2', 'Vazirmatn', sans-serif;
            font-size: 1.7rem;
            font-weight: 800;
            color: var(--text-dark);
            letter-spacing: 0px;
            background: linear-gradient(135deg, #6366f1, #a855f7, #ec4899);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            text-shadow: none;
            line-height: 1.2;
        }

        .nav-links {
            display: flex;
            align-items: center;
            gap: 4px;
            list-style: none;
        }

        .nav-link {
            position: relative;
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 8px 18px;
            border-radius: 16px;
            font-weight: 500;
            font-size: 0.9rem;
            color: var(--text-gray);
            text-decoration: none;
            cursor: pointer;
            background: transparent;
            border: none;
            -webkit-tap-highlight-color: transparent !important;
        }

        .nav-link svg {
            width: 26px;
            height: 26px;
            display: block;
            flex-shrink: 0;
            stroke: var(--text-gray);
        }

        .auth-btn {
            background: #E6E6FA !important;
            color: var(--text-dark) !important;
            box-shadow: 0 4px 20px rgba(230, 230, 250, 0.3);
            font-weight: 600 !important;
            border-radius: 16px !important;
        }
        
        .auth-btn svg {
            stroke: var(--text-dark) !important;
        }

        .logout-btn {
            color: #dc2626 !important;
            background: rgba(220, 38, 38, 0.08) !important;
            border-radius: 16px !important;
        }

        .logout-btn svg {
            stroke: #dc2626 !important;
        }

        /* ===== آیکون قفل ===== */
        .extra-icon {
            display: flex;
            width: 46px;
            height: 46px;
            border-radius: 14px;
            background: rgba(255, 255, 255, 0.4);
            align-items: center;
            justify-content: center;
            cursor: pointer;
            -webkit-tap-highlight-color: transparent !important;
            border: 1px solid rgba(255, 255, 255, 0.3);
            backdrop-filter: blur(10px);
            transition: all 0.3s ease;
        }

        .extra-icon:hover {
            background: rgba(255, 255, 255, 0.7);
            transform: scale(1.05);
        }

        .extra-icon:active {
            transform: scale(0.92);
        }

        .extra-icon svg {
            width: 28px;
            height: 28px;
            display: block;
        }

        .extra-icon svg path {
            stroke: var(--text-dark);
        }

        .extra-icon.clicked {
            animation: menuBtnClick 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        @keyframes menuBtnClick {
            0% { transform: scale(1); }
            40% { transform: scale(0.85); }
            70% { transform: scale(1.1); }
            100% { transform: scale(1); }
        }

        /* ===== دکمه همبرگر - فقط در موبایل ===== */
        .mobile-menu-btn {
            display: none;
            width: 46px;
            height: 46px;
            border-radius: 14px;
            background: rgba(255, 255, 255, 0.4);
            border: 1px solid rgba(255, 255, 255, 0.3);
            cursor: pointer;
            align-items: center;
            justify-content: center;
            padding: 0;
            -webkit-tap-highlight-color: transparent !important;
            backdrop-filter: blur(10px);
        }

        .mobile-menu-btn svg {
            width: 30px;
            height: 30px;
            display: block;
            stroke: var(--text-dark);
        }

        .mobile-menu-btn.clicked {
            animation: menuBtnClick 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        .nav-links {
            display: flex;
        }

        /* ===== منوی موبایل ===== */
        .nav-links.active {
            animation: menuOpen 0.5s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
        }

        @keyframes menuOpen {
            from {
                opacity: 0;
                transform: translateY(-30px) scale(0.9) rotateX(-10deg);
            }
            to {
                opacity: 1;
                transform: translateY(0) scale(1) rotateX(0deg);
            }
        }

        .nav-links.closing {
            animation: menuClose 0.4s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
        }

        @keyframes menuClose {
            from {
                opacity: 1;
                transform: translateY(0) scale(1) rotateX(0deg);
            }
            to {
                opacity: 0;
                transform: translateY(-30px) scale(0.9) rotateX(-10deg);
            }
        }

        .nav-links.active .nav-link {
            animation: linkFadeIn 0.5s cubic-bezier(0.34, 1.56, 0.64, 1) backwards;
        }

        .nav-links.active .nav-link:nth-child(1) { animation-delay: 0.05s; }
        .nav-links.active .nav-link:nth-child(2) { animation-delay: 0.1s; }
        .nav-links.active .nav-link:nth-child(3) { animation-delay: 0.15s; }
        .nav-links.active .nav-link:nth-child(4) { animation-delay: 0.2s; }

        @keyframes linkFadeIn {
            from {
                opacity: 0;
                transform: translateX(20px) scale(0.9);
            }
            to {
                opacity: 1;
                transform: translateX(0) scale(1);
            }
        }

        .menu-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.25);
            backdrop-filter: blur(4px);
            -webkit-backdrop-filter: blur(4px);
            z-index: 998;
            animation: overlayFade 0.4s ease;
        }

        .menu-overlay.active {
            display: block;
        }

        .menu-overlay.closing {
            animation: overlayFadeOut 0.4s ease forwards;
        }

        @keyframes overlayFade {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        @keyframes overlayFadeOut {
            from { opacity: 1; }
            to { opacity: 0; }
        }

        /* ===== انیمیشن کلیک برای همه المان‌ها ===== */
        .clickable {
            cursor: pointer;
        }

        .clickable.clicked {
            animation: clickPop 0.6s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        @keyframes clickPop {
            0% { transform: scale(1); }
            30% { transform: scale(0.85); }
            60% { transform: scale(1.1); }
            100% { transform: scale(1); }
        }

        /* ===== RESPONSIVE ===== */
        @media (max-width: 992px) {
            .header {
                width: 95%;
                padding: 0 18px;
                height: 62px;
                border-radius: 28px;
            }
            
            .nav-links {
                display: none;
                position: absolute;
                top: 72px;
                right: 0;
                left: 0;
                background: rgba(255, 255, 255, 0.85);
                backdrop-filter: blur(32px) saturate(1.4);
                -webkit-backdrop-filter: blur(32px) saturate(1.4);
                padding: 16px;
                border-radius: 24px;
                border: 1px solid rgba(255, 255, 255, 0.3);
                flex-direction: column;
                align-items: stretch;
                box-shadow: 0 20px 60px rgba(0,0,0,0.08);
                gap: 2px;
                transform-origin: top center;
                z-index: 999;
                width: 100%;
            }

            .nav-links.active {
                display: flex;
            }

            .nav-link {
                padding: 14px 18px;
                justify-content: flex-start;
                border-radius: 16px;
                width: 100%;
                transform-origin: right center;
            }

            .nav-link svg {
                width: 28px;
                height: 28px;
            }

            .header .nav > div:last-child {
                gap: 8px;
            }

            .logo .logo-text {
                font-size: 1.5rem;
            }

            /* نمایش دکمه همبرگر در موبایل */
            .mobile-menu-btn {
                display: flex !important;
            }

            /* آیکون قفل در موبایل داخل باکس */
            .extra-icon {
                border: none;
                background: rgba(255, 255, 255, 0.4);
            }

            .menu-icons-box {
                display: flex !important;
                align-items: center;
                gap: 6px;
                background: rgba(255, 255, 255, 0.7);
                border: 1px solid rgba(255, 255, 255, 0.5);
                border-radius: 18px;
                padding: 6px 10px;
                backdrop-filter: blur(12px);
                box-shadow: 0 2px 20px rgba(0, 0, 0, 0.06);
            }
        }

        @media (max-width: 600px) {
            .header {
                padding: 0 14px;
                height: 58px;
                top: 12px;
                border-radius: 24px;
            }
            .logo .logo-text {
                font-size: 1.3rem;
            }
            .logo .logo-icon {
                width: 32px;
                height: 32px;
            }
            .logo .logo-icon svg {
                width: 32px;
                height: 32px;
            }
            .header.scrolled {
                height: 54px;
                top: 8px;
                border-radius: 20px;
            }
            
            .menu-icons-box {
                padding: 4px 8px;
                gap: 4px;
                border-radius: 16px;
                margin-right: -6px;
            }
            
            .extra-icon {
                width: 40px;
                height: 40px;
                border-radius: 12px;
            }
            
            .extra-icon svg {
                width: 24px;
                height: 24px;
            }
            
            .mobile-menu-btn {
                width: 40px;
                height: 40px;
                border-radius: 12px;
            }
            
            .mobile-menu-btn svg {
                width: 26px;
                height: 26px;
            }
            
            .nav-link svg {
                width: 26px;
                height: 26px;
            }

            .nav-links {
                border-radius: 20px;
            }
        }

        @media (max-width: 400px) {
            .header {
                padding: 0 10px;
                border-radius: 20px;
            }
            .logo .logo-text {
                font-size: 1.1rem;
            }
            .menu-icons-box {
                padding: 3px 6px;
                gap: 3px;
                margin-right: -8px;
                border-radius: 14px;
            }
            .extra-icon {
                width: 36px;
                height: 36px;
                border-radius: 10px;
            }
            .extra-icon svg {
                width: 22px;
                height: 22px;
            }
            .mobile-menu-btn {
                width: 36px;
                height: 36px;
                border-radius: 10px;
            }
            .mobile-menu-btn svg {
                width: 24px;
                height: 24px;
            }
            .nav-link svg {
                width: 24px;
                height: 24px;
            }

            .nav-links {
                border-radius: 18px;
                padding: 12px;
            }
        }

        /* ===== دسکتاپ - بدون همبرگر ===== */
        @media (min-width: 993px) {
            .nav-links {
                display: flex !important;
                position: static;
                background: transparent;
                backdrop-filter: none;
                -webkit-backdrop-filter: none;
                padding: 0;
                border-radius: 0;
                border: none;
                box-shadow: none;
                flex-direction: row;
                align-items: center;
                gap: 4px;
                width: auto;
                transform: none;
                animation: none;
                opacity: 1 !important;
            }

            .nav-links.active {
                animation: none;
                opacity: 1 !important;
            }

            .nav-links.closing {
                animation: none;
                opacity: 1 !important;
            }

            .nav-links.active .nav-link {
                animation: none;
            }

            /* مخفی کردن دکمه همبرگر در دسکتاپ */
            .mobile-menu-btn {
                display: none !important;
            }

            /* آیکون قفل تنها در دسکتاپ */
            .menu-icons-box {
                display: flex !important;
                background: transparent;
                border: none;
                padding: 0;
                backdrop-filter: none;
                box-shadow: none;
                gap: 0;
            }

            .extra-icon {
                border: 1px solid rgba(255, 255, 255, 0.3);
                background: rgba(255, 255, 255, 0.4);
            }
        }
    </style>
</head>
<body>

    <div class="background-blobs">
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
    </div>

    <div class="menu-overlay" id="menuOverlay"></div>

    <header class="header" id="header">
        <nav class="nav">
            <!-- LOGO - غیرفعال شده -->
            <div class="logo" id="logoLink">
                <span class="logo-icon">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M9 15C9.85038 15.6303 10.8846 16 12 16C13.1154 16 14.1496 15.6303 15 15" />
                        <ellipse cx="15" cy="9.5" rx="1" ry="1.5" fill="currentColor" stroke="none"/>
                        <ellipse cx="9" cy="9.5" rx="1" ry="1.5" fill="currentColor" stroke="none"/>
                        <path d="M22 12.3006C22 6.61173 17.5228 2 12 2C6.47715 2 2 6.61173 2 12.3006V19.723C2 21.0453 3.35098 21.9054 4.4992 21.314C5.42726 20.836 6.5328 20.9069 7.39614 21.4998C8.36736 22.1667 9.63264 22.1667 10.6039 21.4998L10.9565 21.2576C11.5884 20.8237 12.4116 20.8237 13.0435 21.2576L13.3961 21.4998C14.3674 22.1667 15.6326 22.1667 16.6039 21.4998C17.4672 20.9069 18.5727 20.836 19.5008 21.314C20.649 21.9054 22 21.0453 22 19.723V16.0118" />
                    </svg>
                </span>
                <span class="logo-text">سین‌یار</span>
            </div>
            
            <ul class="nav-links" id="navLinks">
                <li>
                    <a href="#" class="nav-link clickable" data-link="خانه">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M22 12.2039V13.725C22 17.6258 22 19.5763 20.8284 20.7881C19.6569 22 17.7712 22 14 22H10C6.22876 22 4.34315 22 3.17157 20.7881C2 19.5763 2 17.6258 2 13.725V12.2039C2 9.91549 2 8.77128 2.5192 7.82274C3.0384 6.87421 3.98695 6.28551 5.88403 5.10813L7.88403 3.86687C9.88939 2.62229 10.8921 2 12 2C13.1079 2 14.1106 2.62229 16.116 3.86687L18.116 5.10812C20.0131 6.28551 20.9616 6.87421 21.4808 7.82274" />
                            <path d="M15 18H9" />
                        </svg>
                        <span>خانه</span>
                    </a>
                </li>
                <li>
                    <a href="#" class="nav-link clickable" data-link="سرویس‌ها">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M3.17004 7.43994L12 12.5499L20.77 7.46991" />
                            <path d="M12 21.6099V12.5399" />
                            <path d="M9.92999 2.48L4.59 5.45003C3.38 6.12003 2.39001 7.80001 2.39001 9.18001V14.83C2.39001 16.21 3.38 17.89 4.59 18.56L9.92999 21.53C11.07 22.16 12.94 22.16 14.08 21.53L19.42 18.56C20.63 17.89 21.62 16.21 21.62 14.83V9.18001C21.62 7.80001 20.63 6.12003 19.42 5.45003L14.08 2.48C12.93 1.84 11.07 1.84 9.92999 2.48Z" />
                            <path d="M17 13.24V9.58002L7.51001 4.09998" />
                        </svg>
                        <span>سرویس‌ها</span>
                    </a>
                </li>
                <li>
                    <a href="#" class="nav-link clickable" data-link="کیف پول">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M6 8H10" />
                            <path d="M22 10.5C22 10.4226 22 9.96726 21.9977 9.9346C21.9623 9.43384 21.5328 9.03496 20.9935 9.00214C20.9583 9 20.9167 9 20.8333 9H18.2308C16.4465 9 15 10.3431 15 12C15 13.6569 16.4465 15 18.2308 15H20.8333C20.9167 15 20.9583 15 20.9935 14.9979C21.5328 14.965 21.9623 14.5662 21.9977 14.0654C22 14.0327 22 13.5774 22 13.5" />
                            <circle cx="18" cy="12" r="1" fill="currentColor" stroke="none"/>
                            <path d="M13 4C16.7712 4 18.6569 4 19.8284 5.17157C20.6366 5.97975 20.8873 7.1277 20.965 9M10 20H13C16.7712 20 18.6569 20 19.8284 18.8284C20.6366 18.0203 20.8873 16.8723 20.965 15M9 4.00093C5.8857 4.01004 4.23467 4.10848 3.17157 5.17157C2 6.34315 2 8.22876 2 12C2 15.7712 2 17.6569 3.17157 18.8284C3.82475 19.4816 4.69989 19.7706 6 19.8985" />
                        </svg>
                        <span>کیف پول</span>
                    </a>
                </li>
                
                <li style="display: flex; gap: 6px;" id="authButtons">
                    <a href="#" class="nav-link auth-btn clickable" id="loginBtn" style="flex: 1; justify-content: center;">
                        <svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M15 12L12 12M12 12L9 12M12 12L12 9M12 12L12 15" />
                            <path d="M22 12C22 16.714 22 19.0711 20.5355 20.5355C19.0711 22 16.714 22 12 22C7.28595 22 4.92893 22 3.46447 20.5355C2 19.0711 2 16.714 2 12C2 7.28595 2 4.92893 3.46447 3.46447C4.92893 2 7.28595 2 12 2C16.714 2 19.0711 2 20.5355 3.46447C21.5093 4.43821 21.8356 5.80655 21.9449 8" />
                        </svg>
                        <span>ورود</span>
                    </a>
                    <a href="#" class="nav-link logout-btn clickable" id="logoutBtn" style="flex: 1; justify-content: center; display: none;">
                        <svg viewBox="0 0 24 24" fill="none" stroke="#dc2626" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M12 2V6" />
                            <path d="M8.5 3.70605C5.26806 5.07157 3 8.27099 3 12.0001C3 14.3052 3.86656 16.4079 5.29169 18.0002M15.5 3.70605C18.7319 5.07157 21 8.27099 21 12.0001C21 16.9707 16.9706 21.0001 12 21.0001C10.9481 21.0001 9.93834 20.8197 9 20.488" />
                        </svg>
                        <span>خروج</span>
                    </a>
                </li>
            </ul>

            <div style="display: flex; align-items: center; gap: 12px;">
                <div class="menu-icons-box" id="menuIconsBox">
                    <button class="extra-icon clickable" id="extraIcon">
                        <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                            <path d="M10 14.3C10.5207 14.7686 10.8126 15.0314 11.3333 15.5L14 12.5" stroke="#1C274C" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
                            <path d="M9 6V5C9 3.34315 10.3431 2 12 2C13.6569 2 15 3.34315 15 5V6" stroke="#1C274C" stroke-width="1.5" stroke-linecap="round"/>
                            <path d="M20.2235 12.5257C19.6382 9.40452 19.3456 7.84393 18.2347 6.92196C17.1238 6 15.5361 6 12.3605 6H11.6393C8.46374 6 6.87596 6 5.76506 6.92196C4.65416 7.84393 4.36155 9.40452 3.77633 12.5257C2.9534 16.9146 2.54194 19.1091 3.74157 20.5545C4.94119 22 7.17389 22 11.6393 22H12.3605C16.8259 22 19.0586 22 20.2582 20.5545C20.9542 19.7159 21.1079 18.6252 20.9536 17" stroke="#1C274C" stroke-width="1.5" stroke-linecap="round"/>
                        </svg>
                    </button>
                    
                    <button class="mobile-menu-btn clickable" id="mobileMenuBtn">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M14 21H5C4.06812 21 3.60218 21 3.23463 20.8478C2.74458 20.6448 2.35523 20.2554 2.15224 19.7654C2 19.3978 2 18.9319 2 18C2 17.0681 2 16.6022 2.15224 16.2346C2.35523 15.7446 2.74458 15.3552 3.23463 15.1522C3.60218 15 4.06812 15 5 15H19C19.9319 15 20.3978 15 20.7654 15.1522C21.2554 15.3552 21.6448 15.7446 21.8478 16.2346C22 16.6022 22 17.0681 22 18C22 18.9319 22 19.3978 21.8478 19.7654C21.6448 20.2554 21.2554 20.6448 20.7654 20.8478C20.3978 21 19.9319 21 19 21H18" stroke="currentColor" stroke-width="1.5"/>
                            <path d="M2 12C2 11.0681 2 10.6022 2.15224 10.2346C2.35523 9.74458 2.74458 9.35523 3.23463 9.15224C3.60218 9 4.06812 9 5 9H19C19.9319 9 20.3978 9 20.7654 9.15224C21.2554 9.35523 21.6448 9.74458 21.8478 10.2346C22 10.6022 22 11.0681 22 12C22 12.9319 22 13.3978 21.8478 13.7654C21.6448 14.2554 21.2554 14.6448 20.7654 14.8478C20.3978 15 19.9319 15 19 15H5C4.06812 15 3.60218 15 3.23463 14.8478C2.74458 14.6448 2.35523 14.2554 2.15224 13.7654C2 13.3978 2 12.9319 2 12Z" stroke="currentColor" stroke-width="1.5"/>
                            <path d="M10 3H19C19.9319 3 20.3978 3 20.7654 3.15224C21.2554 3.35523 21.6448 3.74458 21.8478 4.23463C22 4.60218 22 5.06812 22 6C22 6.93188 22 7.39782 21.8478 7.76537C21.6448 8.25542 21.2554 8.64477 20.7654 8.84776C20.3978 9 19.9319 9 19 9H5C4.06812 9 3.60218 9 3.23463 8.84776C2.74458 8.64477 2.35523 8.25542 2.15224 7.76537C2 7.39782 2 6.93188 2 6C2 5.06812 2 4.60218 2.15224 4.23463C2.35523 3.74458 2.74458 3.35523 3.23463 3.15224C3.60218 3 4.06812 3 5 3H6" stroke="currentColor" stroke-width="1.5"/>
                            <circle cx="5" cy="12" r="1" fill="currentColor" stroke="none"/>
                            <circle cx="5" cy="6" r="1" fill="currentColor" stroke="none"/>
                            <circle cx="5" cy="18" r="1" fill="currentColor" stroke="none"/>
                        </svg>
                    </button>
                </div>
            </div>
        </nav>
    </header>

    <script>
        function animateElement(el, animationClass) {
            el.classList.remove(animationClass);
            void el.offsetWidth;
            el.classList.add(animationClass);
            setTimeout(() => {
                el.classList.remove(animationClass);
            }, 800);
        }

        const mobileMenuBtn = document.getElementById('mobileMenuBtn');
        const navLinks = document.getElementById('navLinks');
        const menuOverlay = document.getElementById('menuOverlay');
        let isMenuOpen = false;

        function isMobile() {
            return window.innerWidth <= 992;
        }

        function openMenu() {
            if (isMobile()) {
                navLinks.style.display = 'flex';
                navLinks.classList.add('active');
                menuOverlay.classList.add('active');
                menuOverlay.style.display = 'block';
            }
            
            const svg = mobileMenuBtn.querySelector('svg');
            svg.innerHTML = `
                <path d="M18 6L6 18" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
                <path d="M6 6L18 18" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
            `;
            isMenuOpen = true;
        }

        function closeMenu() {
            if (isMobile()) {
                navLinks.classList.remove('active');
                navLinks.classList.add('closing');
                menuOverlay.classList.remove('active');
                menuOverlay.classList.add('closing');
                
                setTimeout(() => {
                    navLinks.classList.remove('closing');
                    navLinks.style.display = 'none';
                    menuOverlay.classList.remove('closing');
                    menuOverlay.style.display = 'none';
                }, 400);
            }
            
            const svg = mobileMenuBtn.querySelector('svg');
            svg.innerHTML = `
                <path d="M14 21H5C4.06812 21 3.60218 21 3.23463 20.8478C2.74458 20.6448 2.35523 20.2554 2.15224 19.7654C2 19.3978 2 18.9319 2 18C2 17.0681 2 16.6022 2.15224 16.2346C2.35523 15.7446 2.74458 15.3552 3.23463 15.1522C3.60218 15 4.06812 15 5 15H19C19.9319 15 20.3978 15 20.7654 15.1522C21.2554 15.3552 21.6448 15.7446 21.8478 16.2346C22 16.6022 22 17.0681 22 18C22 18.9319 22 19.3978 21.8478 19.7654C21.6448 20.2554 21.2554 20.6448 20.7654 20.8478C20.3978 21 19.9319 21 19 21H18" stroke="currentColor" stroke-width="1.5"/>
                <path d="M2 12C2 11.0681 2 10.6022 2.15224 10.2346C2.35523 9.74458 2.74458 9.35523 3.23463 9.15224C3.60218 9 4.06812 9 5 9H19C19.9319 9 20.3978 9 20.7654 9.15224C21.2554 9.35523 21.6448 9.74458 21.8478 10.2346C22 10.6022 22 11.0681 22 12C22 12.9319 22 13.3978 21.8478 13.7654C21.6448 14.2554 21.2554 14.6448 20.7654 14.8478C20.3978 15 19.9319 15 19 15H5C4.06812 15 3.60218 15 3.23463 14.8478C2.74458 14.6448 2.35523 14.2554 2.15224 13.7654C2 13.3978 2 12.9319 2 12Z" stroke="currentColor" stroke-width="1.5"/>
                <path d="M10 3H19C19.9319 3 20.3978 3 20.7654 3.15224C21.2554 3.35523 21.6448 3.74458 21.8478 4.23463C22 4.60218 22 5.06812 22 6C22 6.93188 22 7.39782 21.8478 7.76537C21.6448 8.25542 21.2554 8.64477 20.7654 8.84776C20.3978 9 19.9319 9 19 9H5C4.06812 9 3.60218 9 3.23463 8.84776C2.74458 8.64477 2.35523 8.25542 2.15224 7.76537C2 7.39782 2 6.93188 2 6C2 5.06812 2 4.60218 2.15224 4.23463C2.35523 3.74458 2.74458 3.35523 3.23463 3.15224C3.60218 3 4.06812 3 5 3H6" stroke="currentColor" stroke-width="1.5"/>
                <circle cx="5" cy="12" r="1" fill="currentColor" stroke="none"/>
                <circle cx="5" cy="6" r="1" fill="currentColor" stroke="none"/>
                <circle cx="5" cy="18" r="1" fill="currentColor" stroke="none"/>
            `;
            isMenuOpen = false;
        }

        // فقط در موبایل کلیک روی همبرگر منو را باز/بسته کند
        mobileMenuBtn.addEventListener('click', function(e) {
            e.stopPropagation();
            animateElement(this, 'clicked');
            
            if (!isMobile()) return;
            
            if (isMenuOpen) {
                closeMenu();
            } else {
                openMenu();
            }
        });

        menuOverlay.addEventListener('click', function() {
            if (isMenuOpen && isMobile()) {
                closeMenu();
            }
        });

        document.addEventListener('click', function(e) {
            if (isMenuOpen && isMobile() && !navLinks.contains(e.target) && !mobileMenuBtn.contains(e.target) && !document.getElementById('extraIcon').contains(e.target)) {
                closeMenu();
            }
        });

        window.addEventListener('resize', function() {
            if (!isMobile() && isMenuOpen) {
                closeMenu();
            }
            // در دسکتاپ همیشه منو نمایش داده شود
            if (!isMobile()) {
                navLinks.style.display = 'flex';
                navLinks.style.opacity = '1';
            }
        });

        document.querySelectorAll('.nav-link').forEach(link => {
            link.addEventListener('click', function(e) {
                if (this.id === 'loginBtn' || this.id === 'logoutBtn') {
                    e.preventDefault();
                    animateElement(this, 'clicked');
                    
                    if (this.id === 'loginBtn') {
                        this.style.display = 'none';
                        document.getElementById('logoutBtn').style.display = 'flex';
                    } else {
                        this.style.display = 'none';
                        document.getElementById('loginBtn').style.display = 'flex';
                    }
                    return;
                }
                
                e.preventDefault();
                animateElement(this, 'clicked');
                
                if (isMobile() && isMenuOpen) {
                    setTimeout(() => {
                        closeMenu();
                    }, 300);
                }
            });
        });

        document.getElementById('extraIcon').addEventListener('click', function(e) {
            e.preventDefault();
            animateElement(this, 'clicked');
        });

        window.addEventListener('scroll', function() {
            const header = document.getElementById('header');
            if (window.scrollY > 30) {
                header.classList.add('scrolled');
            } else {
                header.classList.remove('scrolled');
            }
        });

        const style = document.createElement('style');
        style.textContent = `
            .clicked {
                animation: clickPop 0.6s cubic-bezier(0.34, 1.56, 0.64, 1) !important;
            }
            
            @keyframes clickPop {
                0% { transform: scale(1); }
                30% { transform: scale(0.85); }
                60% { transform: scale(1.1); }
                100% { transform: scale(1); }
            }
        `;
        document.head.appendChild(style);
    </script>

</body>
</html>
